## Checklist

- [ ] I branched off `develop` (not `main`)
- [ ] My branch name follows `feat/<name>` or `fix/<name>` convention
- [ ] Commit messages follow `type(scope): description` format
- [ ] I ran `ruff check .` and `npm run lint` locally — no errors
- [ ] I added/updated tests for my changes
- [ ] I did NOT commit any `.env` files or secrets
- [ ] I updated `.env.example` if I added a new environment variable
- [ ] If I changed DB schema, I created a new migration file in `supabase/migrations/`
- [ ] CI passes (lint, tests, security scan)

